# .streamlit/config.toml

[theme]
# El color de acento (checkboxes, líneas, estados activos)
primaryColor = "#2d2e83"

# Color de fondo de la aplicación
backgroundColor = "#ffffff"

# Color de fondo de la barra lateral
secondaryBackgroundColor = "#f8f9fa"

# Color del texto principal
textColor = "#000000"

# Fuente (opcional: sans serif se ve más moderno)
font = "sans serif"